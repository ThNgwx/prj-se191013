<!DOCTYPE html>

<html>
    <head>
        <title>Create</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Create New Account</h1>
        <form action="MainController" method="POST">
            Username* <input type="text" name="txtUsername" value="" /> (e.g from 6 to 20 chars)<br/>
            Password* <input type="password" name="txtPassword" value="" /> (e.g from 6 to 30 chars)<br/>
            Confirm* <input type="password" name="txtConfirm" value="" /><br/>  
            Full Name* <input type="text" name="txtFullName" value="" /> (e.g from 2 to 50 chats)<br/>   
            <input type="submit" value="Create New Account" name="action" />
            <input type="reset" value="Reset" />
        </form>
    </body>
</html>
